<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShopHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<div class="logo">🟡 shophub</div>

<div class="nav">
<a>Home</a>
<a class="active">Shop</a>
<a>Blog</a>
<a>Contact</a>
</div>
</div>

<!-- PRODUCT SECTION -->
<div class="product">

<!-- LEFT -->
<div class="left">
<h1>Nike Air Max 270</h1>
<p>Best sneakers of the year</p>

<div class="thumbs">
<img src="https://via.placeholder.com/60">
<img src="https://via.placeholder.com/60">
<img src="https://via.placeholder.com/60">
</div>
</div>

<!-- CENTER -->
<div class="center">
<img src="https://via.placeholder.com/300" class="main-img">
<h2>$290.00</h2>
</div>

<!-- RIGHT -->
<div class="right">

<div class="rating">⭐⭐⭐⭐☆ 4.5</div>

<div class="sizes">
<button>37</button>
<button class="active">38</button>
<button>39</button>
</div>

<button class="cart">Add to cart</button>

</div>

</div>

</div>

</body>
</html>
